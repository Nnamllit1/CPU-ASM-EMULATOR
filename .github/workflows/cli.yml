# Disclaimer:
# This workflow was created with help from an AI agent because the maintainer
# chose the sensible lazy route instead of hand-rolling YAML by candlelight.

name: CLI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-release:
    name: Build, Smoke Test, and Release
    runs-on: windows-latest

    env:
      CONFIGURATION: ReleaseSize
      PLATFORM: x64
      EXE_PATH: x64\ReleaseSize\CPU-ASM-EMULATOR.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: >
          msbuild CPU-ASM-EMULATOR.slnx
          /p:Configuration=${{ env.CONFIGURATION }}
          /p:Platform=${{ env.PLATFORM }}
          /p:PlatformToolset=v143
          /m

      - name: Smoke test CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Join-Path $PWD "${{ env.EXE_PATH }}"

          if (-not (Test-Path $exe)) {
            throw "Executable was not built: $exe"
          }

          $help = & $exe --help
          if ($LASTEXITCODE -ne 0 -or ($help -join "`n") -notmatch "Usage: CPU-ASM-EMULATOR") {
            throw "--help did not print the expected usage text."
          }

          $version = & $exe --version
          if ($LASTEXITCODE -ne 0 -or ($version -join "`n") -notmatch "CPU-ASM-EMULATOR version") {
            throw "--version did not print the expected version text."
          }

          $tempDir = Join-Path ([System.IO.Path]::GetTempPath()) ("cpu-asm-emulator-" + [System.Guid]::NewGuid())
          New-Item -ItemType Directory -Path $tempDir | Out-Null

          try {
            $asmPath = Join-Path $tempDir "hello.asm"
            @(
              "start:",
              "    %putc r0 72",
              "    %putc r0 105",
              "    %newline r0",
              "    hlt"
            ) | Set-Content -Path $asmPath -Encoding ascii

            $outbin = & $exe --asm $asmPath --outbin
            if ($LASTEXITCODE -ne 0) {
              throw "Assembler returned exit code $LASTEXITCODE."
            }

            $binaryLines = @($outbin | Where-Object { $_ -match "^[0-9A-F]{4}: [01]{8}$" })
            if ($binaryLines.Count -ne 56) {
              Write-Host "Assembler output:"
              Write-Host ($outbin -join "`n")
              throw "Expected 56 encoded bytes from 7 macro-expanded instructions, got $($binaryLines.Count)."
            }

            $expectedFirstInstruction = @(
              "0000: 00000000",
              "0001: 00000000",
              "0002: 00000000",
              "0003: 00000000",
              "0004: 00000000",
              "0005: 00000000",
              "0006: 00000000",
              "0007: 01001000"
            )

            $actualFirstInstruction = @($binaryLines | Select-Object -First 8)
            if (($actualFirstInstruction -join "`n") -ne ($expectedFirstInstruction -join "`n")) {
              Write-Host "Assembler output:"
              Write-Host ($outbin -join "`n")
              throw "First instruction was not 'movi r0, 72'."
            }

            $run = & $exe --asm $asmPath --emulate
            if ($LASTEXITCODE -ne 0) {
              throw "Emulator returned exit code $LASTEXITCODE."
            }

            if (($run -join "`n") -notmatch "Hi") {
              throw "Emulator output did not contain the expected text."
            }
          }
          finally {
            Remove-Item -LiteralPath $tempDir -Recurse -Force
          }

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -LiteralPath "${{ env.EXE_PATH }}" -Destination "dist\CPU-ASM-EMULATOR.exe"
          Compress-Archive -Path "dist\CPU-ASM-EMULATOR.exe" -DestinationPath "dist\CPU-ASM-EMULATOR-windows-x64.zip" -Force
          Get-ChildItem "dist\CPU-ASM-EMULATOR.exe", "dist\CPU-ASM-EMULATOR-windows-x64.zip" |
            Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPU-ASM-EMULATOR-windows-x64
          path: dist/CPU-ASM-EMULATOR-windows-x64.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CPU-ASM-EMULATOR-windows-x64.zip
